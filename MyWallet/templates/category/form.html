{% extends "base.html" %}
{% block title %}{{ 'Edit' if category else 'Add' }} Category — MyWallet{% endblock %}
{% block content %}
<div class="page-header">
    <h4>{{ '✏️ Edit' if category else '➕ New' }} Category</h4>
</div>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category Name</label>
                    <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Icon (emoji)</label>
                    <input type="text" name="icon" class="form-control" value="{{ category.icon if category else '📦' }}" placeholder="e.g. 🎯">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill fw-semibold">{{ 'Update' if category else 'Create' }}</button>
                    <a href="{{ url_for('category.index') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Register — MyWallet{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; margin-left:-2rem; margin-right:-2rem; background: linear-gradient(135deg, #1e1b2e, #2d2a3e);">
    <div class="card p-4" style="width:100%; max-width:420px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color:#6c5ce7;">Create Account 💜</h2>
            <p class="text-muted mb-0">Start managing your finances</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your name" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Create Account</button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#6c5ce7;">Sign In</a></p>
    </div>
</div>
{% endblock %}

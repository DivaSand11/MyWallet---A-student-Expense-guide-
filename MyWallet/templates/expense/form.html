{% extends "base.html" %}
{% block title %}{{ 'Edit' if expense else 'Add' }} Expense — MyWallet{% endblock %}
{% block content %}
<div class="page-header">
    <h4>{{ '✏️ Edit' if expense else '➕ Add' }} Expense</h4>
</div>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    <input type="text" name="title" class="form-control" placeholder="e.g. Lunch, Bus ticket" value="{{ expense.title if expense else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select name="category_id" class="form-select" required>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if expense and expense.category_id == cat.id %}selected{% endif %}>{{ cat.icon }} {{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount (₹)</label>
                    <input type="number" name="amount" class="form-control" step="0.01" value="{{ expense.amount if expense else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Date</label>
                    <input type="date" name="date" class="form-control" value="{{ expense.date.strftime('%Y-%m-%d') if expense else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Note (optional)</label>
                    <input type="text" name="note" class="form-control" value="{{ expense.note if expense else '' }}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill fw-semibold">{{ 'Update' if expense else 'Add Expense' }}</button>
                    <a href="{{ url_for('expense.index') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
